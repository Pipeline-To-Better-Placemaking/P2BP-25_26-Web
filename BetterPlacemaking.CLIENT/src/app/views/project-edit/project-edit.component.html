<!-- Project Edit Layout -->
<div class="flex min-h-screen bg-base-200 p-4 gap-4 text-sm">
  <!-- Sidebar Form -->
  <aside class="card w-64 bg-base-100 shadow-md">
    <div class="card-body space-y-4">
      <h2 class="card-title">Camera Details</h2>

      <label class="form-control w-full">
        <span class="label-text">Name</span>
        <input [(ngModel)]="cameraName" type="text" class="input input-bordered" />
      </label>

      <label class="form-control w-full">
        <span class="label-text">Height</span>
        <input [(ngModel)]="cameraHeight" type="text" class="input input-bordered" />
      </label>

      <label class="form-control w-full">
        <span class="label-text">Cluster</span>
        <select [(ngModel)]="cameraCluster" class="select select-bordered">
          <option>North Cluster</option>
          <option>South Cluster</option>
          <option>Center Cluster</option>
        </select>
      </label>

      <label class="form-control w-full">
        <span class="label-text">Notes</span>
        <textarea
          [(ngModel)]="cameraNotes"
          rows="4"
          class="textarea textarea-bordered"
          placeholder="Notes..."
        ></textarea>
      </label>

      <div class="flex justify-end gap-2">
        <button (click)="saveCamera()" class="btn btn-primary btn-sm">Save</button>
      </div>
    </div>
  </aside>

  <!-- Toolbar -->
  <nav class="flex flex-col gap-3 p-3 bg-base-100 shadow-md rounded-md w-14 items-center">
    <button
      (click)="saveCamera()"
      class="btn btn-square btn-sm"
      title="Save"
      aria-label="Save camera changes"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        class="h-6 w-6"
        stroke="currentColor"
        fill="none"
        stroke-width="2"
      >
        <path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </button>
    <button class="btn btn-square btn-sm" title="Alert" aria-label="Flag alert">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        class="h-6 w-6"
        stroke="currentColor"
        fill="none"
        stroke-width="2"
      >
        <path
          d="M12 9v4m0 4h.01M12 2l10 19H2L12 2z"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
    <button class="btn btn-square btn-sm" title="Add Camera" aria-label="Add camera">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        class="h-6 w-6"
        stroke="currentColor"
        fill="none"
        stroke-width="2"
      >
        <rect x="3" y="7" width="18" height="13" rx="2" ry="2" />
        <path d="M8 7V5h2l1-2h4l1 2h2v2" stroke-linejoin="round" />
      </svg>
    </button>
    <button
      class="btn btn-square btn-sm"
      title="Delete Camera"
      aria-label="Delete selected camera"
      (click)="deleteCamera(getSelectedCamera())"
    >
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 24 24"
        class="h-6 w-6"
        stroke="currentColor"
        fill="none"
        stroke-width="2"
      >
        <path
          d="M3 6h18M8 6V4h8v2m-9 4l1 10h8l1-10"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </button>
  </nav>

  <!-- Main Canvas -->
  <main class="flex-1 relative bg-base-100 rounded-md shadow-inner overflow-hidden">
    <img
      *ngIf="floorplanUrl"
      [src]="floorplanUrl"
      alt="Floorplan"
      class="absolute inset-0 w-full h-full object-contain"
    />
  </main>
</div>
