<div class="min-h-screen w-full flex items-center justify-center surface-ground p-4">
	<p-card class="w-full max-w-md content-background">
		<ng-template pTemplate="title">
			<div class="text-center">
				<div class="text-xl font-semibold">Better Placemaking</div>
				<div class="text-sm text-surface-500">{{ isSignup ? 'Create an account' : 'Sign in' }}</div>
			</div>
		</ng-template>

		<ng-template pTemplate="content">
			<form *ngIf="!isSignup" [formGroup]="loginForm" (ngSubmit)="submitLogin()" class="flex flex-col gap-4">
				<div class="flex flex-col gap-2">
					<label class="text-sm font-medium" for="login-email">Email</label>
					<input
						id="login-email"
						pInputText
						type="email"
						formControlName="email"
						autocomplete="email"
						class="w-full"
					/>
					<div *ngIf="loginForm.controls.email.touched && loginForm.controls.email.invalid" class="text-xs text-red-600">
						Enter a valid email.
					</div>
				</div>

				<div class="flex flex-col gap-2">
					<label class="text-sm font-medium" for="login-password">Password</label>
					<p-password
						inputId="login-password"
						formControlName="password"
						[feedback]="false"
						[toggleMask]="true"
						styleClass="w-full"
						inputStyleClass="w-full"
					/>
					<div *ngIf="loginForm.controls.password.touched && loginForm.controls.password.invalid" class="text-xs text-red-600">
						Password is required.
					</div>
				</div>

				<p-button
					type="submit"
					label="Sign in"
					[loading]="submitting"
					[disabled]="submitting"
					styleClass="w-full"
				/>

				<div class="text-center text-sm">
					<p-button type="button" severity="secondary" variant="text" label="Create an account" [link]="true" styleClass="p-0" (onClick)="toggleMode()" />
				</div>
			</form>

			<form *ngIf="isSignup" [formGroup]="signupForm" (ngSubmit)="submitSignup()" class="flex flex-col gap-4">
				<div class="grid grid-cols-1 gap-4 sm:grid-cols-2">
					<div class="flex flex-col gap-2">
						<label class="text-sm font-medium" for="signup-first">First name</label>
						<input id="signup-first" pInputText type="text" formControlName="firstName" class="w-full" />
					</div>

					<div class="flex flex-col gap-2">
						<label class="text-sm font-medium" for="signup-last">Last name</label>
						<input id="signup-last" pInputText type="text" formControlName="lastName" class="w-full" />
					</div>
				</div>

				<div class="flex flex-col gap-2">
					<label class="text-sm font-medium" for="signup-email">Email</label>
					<input
						id="signup-email"
						pInputText
						type="email"
						formControlName="email"
						autocomplete="email"
						class="w-full"
					/>
					<div *ngIf="signupForm.controls.email.touched && signupForm.controls.email.invalid" class="text-xs text-red-600">
						Enter a valid email.
					</div>
				</div>

				<div class="flex flex-col gap-2">
					<label class="text-sm font-medium" for="signup-password">Password</label>
					<p-password
						inputId="signup-password"
						formControlName="password"
						[feedback]="false"
						[toggleMask]="true"
						styleClass="w-full"
						inputStyleClass="w-full"
					/>
				</div>

				<p-button
					type="submit"
					label="Create account"
					[loading]="submitting"
					[disabled]="submitting"
					styleClass="w-full"
				/>

				<div class="text-center text-sm">
					<p-button type="button" severity="secondary" variant="text" label="Back to sign in" [link]="false" styleClass="p-0" (onClick)="toggleMode()" />
				</div>
			</form>
		</ng-template>
	</p-card>

	<p-button
		[icon]="themeService.isDark ? 'pi pi-sun' : 'pi pi-moon'"
		[rounded]="true"
		[text]="true"
		severity="secondary"
		(onClick)="themeService.toggleDarkMode()"
		class="fixed bottom-4 right-4"
	/>
</div>
