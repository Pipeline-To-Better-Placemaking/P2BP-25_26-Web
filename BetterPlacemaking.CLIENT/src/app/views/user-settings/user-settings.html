<p-card header="User Settings">
  <div class="settings-grid">

    <!-- Profile + Notifications -->
    <div class="col">
      <p-card header="Profile" class="subcard">
        <div class="settings-form">

          <div class="field">
            <label for="email">Email</label>
            <div id="email" class="text-sm">{{ model.email || '(not available)' }}</div>
          </div>

          <div class="field">
            <label for="firstName">First name</label>
            <input pInputText id="firstName" [(ngModel)]="model.firstName" (ngModelChange)="onProfileNameInput()" />
          </div>

          <div class="field">
            <label for="lastName">Last name</label>
            <input pInputText id="lastName" [(ngModel)]="model.lastName" (ngModelChange)="onProfileNameInput()" />
          </div>

          <p-button
            label="Save"
            icon="pi pi-save"
            [loading]="saving"
            (onClick)="save()"> 
          </p-button>

          <p-message
            *ngIf="settingsError"
            severity="error"
            [text]="settingsError">
          </p-message>

          <p-message
            *ngIf="settingsSuccess"
            severity="success"
            text="Settings saved.">
          </p-message>

        </div>
      </p-card>

      <p-card header="Notifications" class="subcard">
        <div class="settings-form">
          <p-checkbox
            inputId="emailAlerts"
            [binary]="true"
            [(ngModel)]="notifications.emailAlerts"
            (ngModelChange)="saveNotifications()">
          </p-checkbox>
          <label for="emailAlerts">Email alerts</label>

          <p-checkbox
            inputId="scanCompletion"
            [binary]="true"
            [(ngModel)]="notifications.scanCompletionAlerts"
            (ngModelChange)="saveNotifications()">
          </p-checkbox>
          <label for="scanCompletion">Scan completion alerts</label>

          <p-checkbox
            inputId="changeDetection"
            [binary]="true"
            [(ngModel)]="notifications.changeDetectionAlerts"
            (ngModelChange)="saveNotifications()">
          </p-checkbox>
          <label for="changeDetection">Change detection alerts</label>
        </div>
      </p-card>
    </div>

    <!-- Change Password + Projects -->
    <div class="col">
      <p-card header="Change Password" class="subcard">
        <div class="settings-form">

          <div class="field">
            <label for="currentPassword">Current password</label>
            <p-password
              inputId="currentPassword"
              name="current-password-settings"
              [feedback]="false"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="off"
              [(ngModel)]="password.current">
            </p-password>
          </div>

          <div class="field">
            <label for="newPassword">New password</label>
            <p-password
              inputId="newPassword"
              name="new-password-settings"
              [feedback]="true"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="new-password"
              [(ngModel)]="password.new">
            </p-password>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <p-password
              inputId="confirmPassword"
              name="confirm-password-settings"
              [feedback]="false"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="new-password"
              [(ngModel)]="password.confirm">
            </p-password>
          </div>

          <div class="row">
            <p-button
              label="Update Password"
              icon="pi pi-key"
              [disabled]="!canSubmitPassword()"
              (onClick)="updatePassword()">
            </p-button>

            <p-button
              label="Clear"
              icon="pi pi-times"
              severity="secondary"
              (onClick)="clearPassword()">
            </p-button>
          </div>

          <p-message
            *ngIf="passwordError"
            severity="error"
            [text]="passwordError">
          </p-message>

          <p-message
            *ngIf="passwordSuccess"
            severity="success"
            text="Password updated (placeholder).">
          </p-message>
          <p-button
            label="Forgot password?"
            variant="text"
            [link]="true"
            styleClass="p-0 text-sm"
            routerLink="/forgot-password">
          </p-button>

        </div>
      </p-card>

      <p-card header="Assigned Projects" class="subcard">
        <p-table [value]="assignedProjects" [scrollable]="true" scrollHeight="260px">
          <ng-template pTemplate="header">
            <tr>
              <th>Project</th>
              <th>Role</th>
            </tr>
          </ng-template>
          <ng-template pTemplate="body" let-row>
            <tr>
              <td>{{ row.name }}</td>
              <td><p-tag [value]="row.role"></p-tag></td>
            </tr>
          </ng-template>
          <ng-template pTemplate="emptymessage">
            <tr>
              <td colspan="2" class="text-center text-sm text-surface-500">No projects assigned.</td>
            </tr>
          </ng-template>
        </p-table>
      </p-card>
    </div>

  </div>
</p-card>
