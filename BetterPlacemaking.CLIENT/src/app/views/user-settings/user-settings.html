<p-toast></p-toast>
<p-card header="User Settings">
  <div class="settings-grid">

    <!-- Profile -->
    <div class="col">
      <p-card header="Profile" class="subcard">
        <div class="settings-form">

          <div class="field">
            <label for="email">Email</label>
            <div id="email" class="text-sm">{{ model.email || '(not available)' }}</div>
          </div>

          <div class="field">
            <label for="firstName">First name</label>
            <input pInputText id="firstName" [(ngModel)]="model.firstName" (ngModelChange)="onProfileNameInput()" />
          </div>

          <div class="field">
            <label for="lastName">Last name</label>
            <input pInputText id="lastName" [(ngModel)]="model.lastName" (ngModelChange)="onProfileNameInput()" />
          </div>

          <p-button
            label="Save"
            icon="pi pi-save"
            [loading]="saving"
            (onClick)="save()">
          </p-button>

          <p-message
            *ngIf="settingsError"
            severity="error"
            [text]="settingsError">
          </p-message>

          <p-message
            *ngIf="settingsSuccess"
            severity="success"
            text="Settings saved.">
          </p-message>

        </div>
      </p-card>
    </div>

    <!-- Change Password -->
    <div class="col">
      <p-card header="Change Password" class="subcard">
        <div class="settings-form">

          <div class="field">
            <label for="currentPassword">Current password</label>
            <p-password
              inputId="currentPassword"
              name="current-password-settings"
              [feedback]="false"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="off"
              [(ngModel)]="password.current">
            </p-password>
          </div>

          <div class="field">
            <label for="newPassword">New password</label>
            <p-password
              inputId="newPassword"
              name="new-password-settings"
              [feedback]="true"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="new-password"
              [(ngModel)]="password.new">
            </p-password>
          </div>

          <div class="field">
            <label for="confirmPassword">Confirm new password</label>
            <p-password
              inputId="confirmPassword"
              name="confirm-password-settings"
              [feedback]="false"
              [toggleMask]="true"
              [fluid]="true"
              inputStyleClass="w-full"
              autocomplete="new-password"
              [(ngModel)]="password.confirm">
            </p-password>
          </div>

          <div class="row">
            <p-button
              label="Update Password"
              icon="pi pi-key"
              [disabled]="!canSubmitPassword()"
              (onClick)="updatePassword()">
            </p-button>

            <p-button
              label="Clear"
              icon="pi pi-times"
              severity="secondary"
              (onClick)="clearPassword()">
            </p-button>
          </div>

          <p-message
            *ngIf="passwordError"
            severity="error"
            [text]="passwordError">
          </p-message>

          <p-message
            *ngIf="passwordSuccess"
            severity="success"
            text="Password updated (placeholder).">
          </p-message>
          <p-button
            label="Forgot password?"
            variant="text"
            [link]="true"
            styleClass="p-0 text-sm"
            routerLink="/forgot-password">
          </p-button>

        </div>
      </p-card>
    </div>

  </div>

  <!-- Full-width notifications table below the two-column grid -->
  <p-card header="Notifications Per Assigned Project" class="subcard">
    <p-table [value]="assignedProjects">
      <ng-template pTemplate="header">
        <tr>
          <th rowspan="2">Project</th>
          <th rowspan="2">Role</th>
          <th colspan="3" class="text-center" style="font-weight:700">Scan Notifications</th>
          <th colspan="3" class="text-center" style="font-weight:700">System Notifications</th>
        </tr>
        <tr>
          <th>Own Scan</th>
          <th>Others' Scans</th>
          <th>Scheduled</th>
          <th>On/Off</th>
          <th>Health</th>
          <th>Email PDF</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>{{ row.name }}</td>
          <td><p-tag [value]="row.role"></p-tag></td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.notifyOnOwnScan"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.notifyOnOthersScan"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.notifyOnScheduledScan"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.notifyOnSystemToggle"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.notifyOnHealthAlert"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
          <td>
            <p-checkbox [binary]="true" [(ngModel)]="row.emailPdfOnSystemOff"
              (ngModelChange)="onNotificationPrefChange(row)"></p-checkbox>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="8" class="text-center text-sm text-surface-500">No projects assigned.</td>
        </tr>
      </ng-template>
    </p-table>
  </p-card>
</p-card>
