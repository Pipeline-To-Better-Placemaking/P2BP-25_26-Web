<div class="flex flex-col gap-4 p-1">

  <div class="text-sm text-muted-color">
    Select the date range to fuse. All sensor data captured between the two timestamps will be processed.
  </div>

  <!-- Date range — inline pickers side by side -->
  <div class="grid grid-cols-2 gap-6">

    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold">From</label>
      <p-datepicker
        [(ngModel)]="fromDate"
        [inline]="true"
        [maxDate]="maxDate"
        [showTime]="true"
        hourFormat="12"
        dateFormat="mm/dd/yy" />
      <div class="text-xs text-muted-color text-center">
        {{ fromDate ? (fromDate | date:'medium') : 'Not selected' }}
      </div>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-sm font-semibold">To</label>
      <p-datepicker
        [(ngModel)]="toDate"
        [inline]="true"
        [maxDate]="maxDate"
        [showTime]="true"
        hourFormat="12"
        dateFormat="mm/dd/yy" />
      <div class="text-xs text-muted-color text-center">
        {{ toDate ? (toDate | date:'medium') : 'Not selected' }}
      </div>
    </div>

  </div>

  <!-- Validation -->
  <p-message
    *ngIf="!dateRangeValid"
    severity="warn"
    text="'From' date must be before 'To' date."
    styleClass="w-full" />

  <!-- Error -->
  <p-message
    *ngIf="error"
    severity="error"
    [text]="error"
    styleClass="w-full" />

  <!-- Actions -->
  <div class="flex justify-end gap-2 border-t border-surface-200 dark:border-surface-700 pt-3">
    <p-button
      label="Cancel"
      severity="secondary"
      [disabled]="submitting"
      (onClick)="cancel()" />
    <p-button
      label="Run Fusion"
      icon="pi pi-play"
      [loading]="submitting"
      [disabled]="!canSubmit || !dateRangeValid"
      (onClick)="submit()" />
  </div>

</div>
