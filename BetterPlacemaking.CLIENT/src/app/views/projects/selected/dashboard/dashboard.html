<div class="w-full h-full p-4">
  <!-- Vertical splitter: top 50%, bottom 50% -->
  <p-splitter layout="vertical" [panelSizes]="[50,50]" [minSizes]="[0,0]" style="height: 100%;">

    <!-- Top row: horizontal splitter 50%/50% -->
    <ng-template pTemplate="panel">
      <p-splitter [panelSizes]="[50,50]" [minSizes]="[0,0]">
        <ng-template pTemplate="panel">
          <div class="h-full w-full flex items-center justify-center">
            Project Title / Status / Description
          </div>
        </ng-template>
        <ng-template pTemplate="panel">
          <div class="h-full w-full flex items-center justify-center">
            Device Count
          </div>
        </ng-template>
      </p-splitter>
    </ng-template>

    <!-- Bottom row: horizontal splitter 50%/50% -->
    <ng-template pTemplate="panel">
      <p-splitter [panelSizes]="[50,50]" [minSizes]="[0,0]">
        <ng-template pTemplate="panel">
          <div class="h-full w-full flex items-center justify-center">
            Last Scan time
          </div>
        </ng-template>
        <ng-template pTemplate="panel">
          <div class="h-full w-full flex items-center justify-center">
            Alerts Status
          </div>
        </ng-template>
      </p-splitter>
    </ng-template>

  </p-splitter>
</div>
