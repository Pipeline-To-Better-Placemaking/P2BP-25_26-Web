<div class="w-full flex flex-col content-background rounded-lg">
  <p-table [value]="projects" class="rounded-lg overflow-hidden">

    <ng-template #caption>
      <div class="w-full flex justify-between items-center">
        <div class="gap-3">
          <span class="font-semibold text-xl">Projects</span>
        </div>
      </div>
    </ng-template>

    <ng-template #header>
      <tr>
        <th>Title</th>
        <th>Description</th>
        <th>Location</th>
        <th>Action</th>
      </tr>
    </ng-template>

    <ng-template #body let-project>
      <tr>
        <td>{{ project.Title }}</td>
        <td>{{ project.Description }}</td>
        <td>{{ project.Location }}</td>
        <td>
          <a
            pButton
            type="button"
            class="p-button-sm p-button-outlined"
            [routerLink]="['/', project.Id]"
          >
            Open
          </a>
        </td>
      </tr>
    </ng-template>

    <ng-template #emptymessage>
      <tr>
        <td colspan="4">No projects assigned.</td>
      </tr>
    </ng-template>

  </p-table>

</div>
