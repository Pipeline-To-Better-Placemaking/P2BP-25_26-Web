<div *hasPermission="'Global.Users.Read'" class="w-full flex flex-col content-background rounded-lg">
  <p-toast key="permissions" position="bottom-right"></p-toast>

  <p-table
    [value]="filteredUsers"
    class="rounded-lg overflow-hidden"
    [paginator]="true"
    [rows]="10"
    [loading]="isLoading"
  >
    <ng-template #caption>
      <div class="w-full flex flex-col gap-3">
        <div class="flex flex-col md:flex-row justify-between md:items-center gap-2">
          <div class="flex items-center gap-3">
            <span class="font-semibold text-xl">Users</span>
            <span class="text-muted-color text-xl">{{ filteredUsers.length || 0 }}</span>
          </div>
          <span class="text-sm text-muted-color">
            View registered users and their assigned project counts.
          </span>
        </div>

        <div class="flex flex-col md:flex-row items-start md:items-center gap-2">
          <p-iconfield>
            <p-inputicon styleClass="pi pi-search" />
            <input
              pInputText
              type="text"
              placeholder="Search name or email"
              [(ngModel)]="searchText"
              (ngModelChange)="onSearchChange()"
              class="w-64"
            />
          </p-iconfield>

          <p-button
            *ngIf="hasActiveFilters"
            label="Clear"
            icon="pi pi-times"
            severity="secondary"
            [text]="true"
            (onClick)="clearFilters()"
          ></p-button>
        </div>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
        <th class="cursor-pointer select-none" (click)="toggleSort('name')">
          User
          <i *ngIf="sortField === 'name'" [class]="sortAsc ? 'pi pi-sort-up' : 'pi pi-sort-down'" class="ml-1 text-xs"></i>
        </th>
        <th>Email</th>
        <th class="cursor-pointer select-none" (click)="toggleSort('assignedCount')">
          Assigned Projects
          <i *ngIf="sortField === 'assignedCount'" [class]="sortAsc ? 'pi pi-sort-up' : 'pi pi-sort-down'" class="ml-1 text-xs"></i>
        </th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td class="font-medium">{{ user.name }}</td>
        <td>{{ user.email || '-' }}</td>
        <td>
          <p-tag [value]="user.assignedCount + ' project(s)'" severity="info"></p-tag>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="3" class="text-center text-sm text-muted-color p-4">
          No users match the current filters.
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
