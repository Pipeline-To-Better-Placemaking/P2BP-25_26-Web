<div class="w-full flex flex-col content-background rounded-lg">
  <p-table
    [value]="users"
    class="rounded-lg overflow-hidden"
    [paginator]="true"
    [rows]="5"
  >
    <ng-template #caption>
      <div class="w-full flex justify-between items-center">
        <div class="flex items-center gap-3">
          <span class="font-semibold text-xl">Users</span>
          <span class="text-muted-color text-xl">{{ users.length || 0 }}</span>
        </div>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>User</th>
        <th>Assigned Projects</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.name }}</td>
        <td>
          <p-multiSelect
            [options]="projects"
            [(ngModel)]="user.assignedProjects"
            optionLabel="name"
            optionValue="id"
            placeholder="Select Projects"
            display="chip"
            class="w-full"
            appendTo="body"
          ></p-multiSelect>
        </td>
        <td class="flex flex-col gap-1">
          <p-button
            label="Save"
            icon="pi pi-check"
            class="p-button-sm"
            (onClick)="saveUserPermissions(user)"
          ></p-button>

          <!-- Temporary saved message -->
          <p-message
            *ngIf="user.savedMessage"
            [severity]="'success'"
            [text]="user.savedMessage"
            class="mt-1"
          ></p-message>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
