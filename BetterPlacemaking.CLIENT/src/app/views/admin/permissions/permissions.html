<div class="card p-4 content-background rounded-lg">
  <h2 class="text-xl font-bold mb-4">User Permissions</h2>

  <p-table
    [value]="users"
    class="rounded-lg overflow-visible"
    scrollable
    scrollHeight="400px"
    styleClass="shadow-lg"
  >
    <ng-template pTemplate="header">
      <tr>
        <th>User</th>
        <th>Assigned Projects</th>
        <th>Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.name }}</td>
        <td>
          <p-multiSelect
            [options]="projects"
            [(ngModel)]="user.assignedProjects"
            optionLabel="name"
            optionValue="id"
            placeholder="Select Projects"
            display="chip"
            class="w-full"
            appendTo="body"
          ></p-multiSelect>
        </td>
        <td class="flex flex-col gap-1">
          <p-button
            label="Save"
            icon="pi pi-check"
            class="p-button-sm"
            (onClick)="saveUserPermissions(user)"
          ></p-button>

          <!-- Temporary saved message -->
          <p-message
            *ngIf="user.savedMessage"
            [severity]="'success'"
            [text]="user.savedMessage"
            class="mt-1"
          ></p-message>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
