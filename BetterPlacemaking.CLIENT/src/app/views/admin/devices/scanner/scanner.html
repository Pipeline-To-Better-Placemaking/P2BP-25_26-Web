<div class="lidar-dashboard">

  <!-- Immediate Scan Panel -->
  <div class="p-card shadow-lg rounded-lg overflow-hidden mb-6">
    <p-card header="Immediate Lidar Scan">
      <div class="flex flex-col gap-4">
        <p-button
          label="Perform Scan"
          icon="pi pi-play"
          styleClass="p-button-primary w-full md:w-auto"
          (onClick)="performScan()">
        </p-button>

        <p-message
          *ngIf="scanMessage"
          [text]="scanMessage"
          severity="success">
        </p-message>
      </div>
    </p-card>
  </div>

  <!-- Schedule Scan Panel -->
  <div class="p-card shadow-lg rounded-lg overflow-hidden">
    <p-card header="Schedule Lidar Scan">
      <div class="flex flex-col gap-4">

        <!-- Date and Time Inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="date" class="font-medium">Pick a date:</label>
            <input
              id="date"
              type="date"
              [(ngModel)]="scheduledDate"
              pInputText
              class="w-full">
          </div>

          <div class="flex flex-col gap-2">
            <label for="time" class="font-medium">Pick a time:</label>
            <input
              id="time"
              type="time"
              [(ngModel)]="scheduledTime"
              pInputText
              class="w-full">
          </div>
        </div>

        <!-- Frequency Selection -->
        <div class="flex flex-col gap-2">
          <label for="frequency" class="font-medium">Frequency:</label>
          <div class="relative w-full">
            <select
              id="frequency"
              [(ngModel)]="selectedFrequency"
              class="w-full p-inputtext p-component appearance-none pr-8"
              style="padding: 0.5rem; cursor: pointer;">
              <option [ngValue]="undefined" disabled selected>Select Frequency</option>
              <option *ngFor="let freq of frequencyOptions" [ngValue]="freq">
                {{ freq.name }}
              </option>
            </select>
            <!-- Custom dropdown arrow -->
            <div class="absolute right-3 top-1/2 transform -translate-y-1/2 pointer-events-none">
              <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
              </svg>
            </div>
          </div>
        </div>

        <!-- End Date (conditional) -->
        <div *ngIf="selectedFrequency && selectedFrequency.code !== 'Never'" class="flex flex-col gap-2">
          <label for="endDate" class="font-medium">End at:</label>
          <input
            id="endDate"
            type="date"
            [(ngModel)]="endDate"
            pInputText
            class="w-full">
        </div>

        <!-- Schedule Button -->
        <div class="pt-2">
          <p-button
            label="Schedule Scan"
            icon="pi pi-calendar-plus"
            styleClass="p-button-accent w-full md:w-auto"
            (onClick)="scheduleScan()">
          </p-button>
        </div>

        <!-- Schedule Message -->
        <div *ngIf="scheduleMessage" class="mt-2">
          <p-message
            [text]="scheduleMessage"
            [severity]="scheduleMessage.includes('Please') ? 'error' : 'success'"
            styleClass="w-full">
          </p-message>
        </div>

        <!-- Current Schedules -->
        <div *ngIf="schedules.length" class="mt-6">
          <h3 class="text-lg font-semibold mb-3">Current Schedules:</h3>
          <div class="overflow-x-auto">
            <table class="w-full border-collapse">
              <thead>
                <tr >
                  <th class="text-left p-3 font-medium border-b">Date & Time</th>
                  <th class="text-left p-3 font-medium border-b">Frequency</th>
                  <th class="text-left p-3 font-medium border-b">End Date</th>
                  <th class="text-left p-3 font-medium border-b w-24">Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let s of schedules" class="border-b">
                  <td class="p-3">{{ s.date }} {{ s.time }}</td>
                  <td class="p-3">{{ getScheduleFrequencyName(s.frequency) }}</td>
                  <td class="p-3">{{ s.endDate || '-' }}</td>
                  <td class="p-3">
                    <div class="flex gap-2">
                      <p-button
                        icon="pi pi-pencil"
                        styleClass="p-button-text p-button-rounded p-button-sm"
                        (onClick)="editSchedule(s)"
                        [title]="'Edit schedule'">
                      </p-button>
                      <p-button
                        icon="pi pi-times"
                        styleClass="p-button-text p-button-rounded p-button-danger p-button-sm"
                        (onClick)="cancelSchedule(s.id)"
                        [title]="'Cancel schedule'">
                      </p-button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </p-card>
  </div>

</div>
