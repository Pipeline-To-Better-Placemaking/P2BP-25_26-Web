<div class="lidar-dashboard">

  <div class="p-card shadow-lg rounded-lg overflow-hidden mb-6">
    <p-card header="Immediate Lidar Scan">
      <div class="flex flex-col gap-4">
        <p-button
          label="Perform Scan"
          icon="pi pi-play"
          styleClass="p-button-primary w-full md:w-auto"
          [loading]="scanning"
          [disabled]="scanning"
          (onClick)="performScan()">
        </p-button>

        <p-message
          *ngIf="scanMessage"
          [text]="scanMessage">
        </p-message>


      </div>
    </p-card>
  </div>

  <div class="p-card shadow-lg rounded-lg overflow-hidden">
    <p-card header="Schedule Lidar Scan">
      <div class="flex flex-col gap-4">

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="startDateTime" class="font-medium">Pick a date and time:</label>
            <p-datepicker
              inputId="startDateTime"
              [(ngModel)]="scheduledDateTime"
              (ngModelChange)="onStartDateTimeChange()"
              [showIcon]="true"
              [showTime]="true"
              hourFormat="12"
              appendTo="body"
              placeholder="Select start date and time"
              styleClass="w-full">
            </p-datepicker>
          </div>

          <div class="flex flex-col gap-2">
            <label for="frequency" class="font-medium">Frequency:</label>
            <p-select
              inputId="frequency"
              [options]="frequencyOptions"
              [(ngModel)]="selectedFrequency"
              optionLabel="name"
              placeholder="Select Frequency"
              styleClass="w-full">
            </p-select>
          </div>
        </div>

        <div
          *ngIf="selectedFrequency && selectedFrequency.code !== 'Never'"
          class="flex flex-col gap-4">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label for="endDateTime" class="font-medium">End date and time:</label>
              <p-datepicker
                inputId="endDateTime"
                [(ngModel)]="endDateTime"
                [showIcon]="true"
                [showTime]="true"
                hourFormat="12"
                [minDate]="minEndDate"
                appendTo="body"
                placeholder="Select end date and time"
                styleClass="w-full">
              </p-datepicker>
            </div>
          </div>

        </div>

        <div class="pt-2">
          <p-button
            [label]="editingScheduleId ? 'Update Schedule' : 'Schedule Scan'"
            [icon]="editingScheduleId ? 'pi pi-check' : 'pi pi-calendar-plus'"
            styleClass="p-button-accent w-full md:w-auto"
            (onClick)="scheduleScan()">
          </p-button>
        </div>

        <div *ngIf="scheduleMessage" class="mt-2">
          <p-message
            [text]="scheduleMessage"
            [severity]="scheduleMessage.includes('Please') || scheduleMessage.includes('must') ? 'error' : 'success'"
            styleClass="w-full">
          </p-message>
        </div>

        <div *ngIf="schedules.length" class="mt-6">
          <h3 class="text-lg font-semibold mb-3">Scheduled Scans:</h3>

          <table class="w-full border-collapse">
            <thead>
              <tr>
                <th class="text-left p-3 border-b">Start Date & Time</th>
                <th class="text-left p-3 border-b">Frequency</th>
                <th class="text-left p-3 border-b">End Date & Time</th>
                <th class="text-left p-3 border-b w-24">Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let s of schedules" class="border-b">
                <td class="p-3">{{ s.StartDate }} {{ s.StartTime }}</td>
                <td class="p-3">{{ getScheduleFrequencyName(s.Frequency) }}</td>
                <td class="p-3">
                  <ng-container *ngIf="s.EndDate; else noEndDate">
                    {{ s.EndDate }} {{ s.EndTime }}
                  </ng-container>
                  <ng-template #noEndDate>-</ng-template>
                </td>
                <td class="p-3">
                  <div class="flex gap-2">
                    <p-button
                      icon="pi pi-pencil"
                      styleClass="p-button-text p-button-rounded p-button-sm"
                      (onClick)="editSchedule(s)">
                    </p-button>

                    <p-button
                      icon="pi pi-times"
                      styleClass="p-button-text p-button-rounded p-button-danger p-button-sm"
                      (onClick)="cancelSchedule(s.Id!)">
                    </p-button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

      </div>
    </p-card>
  </div>

  <div class="mt-6 flex flex-col min-h-[min(70vh,640px)]">
    <div class="flex flex-wrap gap-2 mb-3">
      <p-button
        label="2D View"
        [outlined]="visualMode !== 'solids'"
        styleClass="p-button-sm"
        (onClick)="setVisualMode('solids')">
      </p-button>
      <p-button
        label="3D View"
        [outlined]="visualMode !== '3d'"
        styleClass="p-button-sm"
        (onClick)="setVisualMode('3d')">
      </p-button>
    </div>

    <div
      class="flex-1 min-h-0 min-w-0 overflow-hidden [&>*]:flex-1 [&>*]:min-h-0"
      [ngClass]="visualMode === '3d' ? 'flex flex-col' : 'hidden'">
      <app-point-cloud-viewer [projectContextId]="projectId || undefined" />
    </div>

    <div
      class="flex-1 min-h-0 min-w-0 overflow-hidden [&>*]:flex-1 [&>*]:min-h-0"
      [ngClass]="visualMode === 'solids' ? 'flex flex-col' : 'hidden'">
      <app-solid-objects-view
        [solidTabActive]="visualMode === 'solids'"
        [projectContextId]="projectId || undefined" />
    </div>
  </div>

</div>
