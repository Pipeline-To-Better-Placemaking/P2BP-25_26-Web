<div class="lidar-dashboard">

  <!-- Immediate Scan Panel -->
  <div class="p-card shadow-lg rounded-lg overflow-hidden mb-6">
    <p-card header="Immediate Lidar Scan">
      <div class="flex flex-col gap-4">
        <p-button
          label="Perform Scan"
          icon="pi pi-play"
          styleClass="p-button-primary w-full md:w-auto"
          [loading]="scanning"
          [disabled]="scanning"
          (onClick)="performScan()">
        </p-button>

        <p-message
          *ngIf="scanMessage"
          [text]="scanMessage"
          severity="success">
        </p-message>
      </div>
    </p-card>
  </div>

  <!-- Schedule Scan Panel -->
  <div class="p-card shadow-lg rounded-lg overflow-hidden">
    <p-card header="Schedule Lidar Scan">
      <div class="flex flex-col gap-4">

        <!-- Date and Time Inputs -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="flex flex-col gap-2">
            <label for="date" class="font-medium">Pick a date:</label>
            <input
              id="date"
              type="date"
              [(ngModel)]="scheduledDate"
              (ngModelChange)="onStartDateChange()"
              pInputText
              class="w-full">
          </div>

          <div class="flex flex-col gap-2">
            <label for="time" class="font-medium">Pick a time:</label>
            <input
              id="time"
              type="time"
              [(ngModel)]="scheduledTime"
              (ngModelChange)="onStartTimeChange()"
              pInputText
              class="w-full">
          </div>
        </div>

        <!-- Frequency Selection -->
        <div class="flex flex-col gap-2">
          <label for="frequency" class="font-medium">Frequency:</label>
          <select
            id="frequency"
            [(ngModel)]="selectedFrequency"
            class="w-full p-inputtext p-component"
            style="padding: 0.5rem;">
            <option [ngValue]="undefined" disabled selected>
              Select Frequency
            </option>
            <option *ngFor="let freq of frequencyOptions" [ngValue]="freq">
              {{ freq.name }}
            </option>
          </select>
        </div>

        <!-- End Date / Time (for recurring) -->
        <div
          *ngIf="selectedFrequency && selectedFrequency.code !== 'Never'"
          class="flex flex-col gap-4">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="flex flex-col gap-2">
              <label for="endDate" class="font-medium">End date:</label>
              <input
                id="endDate"
                type="date"
                [(ngModel)]="endDate"
                (ngModelChange)="onEndDateChange()"
                [min]="getMinEndDate()"
                pInputText
                class="w-full">
            </div>

            <div class="flex flex-col gap-2">
              <label for="endTime" class="font-medium">End time:</label>
              <input
                id="endTime"
                type="time"
                [(ngModel)]="endTime"
                pInputText
                class="w-full">
            </div>
          </div>

        </div>

        <!-- Schedule Button -->
        <div class="pt-2">
          <p-button
            [label]="editingScheduleId ? 'Update Schedule' : 'Schedule Scan'"
            [icon]="editingScheduleId ? 'pi pi-check' : 'pi pi-calendar-plus'"
            styleClass="p-button-accent w-full md:w-auto"
            (onClick)="scheduleScan()">
          </p-button>
        </div>

        <!-- Message -->
        <div *ngIf="scheduleMessage" class="mt-2">
          <p-message
            [text]="scheduleMessage"
            [severity]="scheduleMessage.includes('Please') || scheduleMessage.includes('must') ? 'error' : 'success'"
            styleClass="w-full">
          </p-message>
        </div>

        <!-- Current Schedules Table -->
        <div *ngIf="schedules.length" class="mt-6">
          <h3 class="text-lg font-semibold mb-3">Scheduled Scans:</h3>

          <table class="w-full border-collapse">
            <thead>
              <tr>
                <th class="text-left p-3 border-b">Start Date & Time</th>
                <th class="text-left p-3 border-b">Frequency</th>
                <th class="text-left p-3 border-b">End Date & Time</th>
                <th class="text-left p-3 border-b w-24">Actions</th>
              </tr>
            </thead>

            <tbody>
              <tr *ngFor="let s of schedules" class="border-b">
                <td class="p-3">{{ s.StartDate }} {{ s.StartTime }}</td>
                <td class="p-3">{{ getScheduleFrequencyName(s.Frequency) }}</td>
                <td class="p-3">
                  <ng-container *ngIf="s.EndDate; else noEndDate">
                    {{ s.EndDate }} {{ s.EndTime }}
                  </ng-container>
                  <ng-template #noEndDate>-</ng-template>
                </td>
                <td class="p-3">
                  <div class="flex gap-2">
                    <p-button
                      icon="pi pi-pencil"
                      styleClass="p-button-text p-button-rounded p-button-sm"
                      (onClick)="editSchedule(s)">
                    </p-button>

                    <p-button
                      icon="pi pi-times"
                      styleClass="p-button-text p-button-rounded p-button-danger p-button-sm"
                      (onClick)="cancelSchedule(s.Id!)">
                    </p-button>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>

        </div>

      </div>
    </p-card>
  </div>

</div>
