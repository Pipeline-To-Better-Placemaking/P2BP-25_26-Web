<!-- Backdrop: transparent when spotlight provides the dim; opaque on welcome step -->
<div class="fixed inset-0 z-[9999]"
     [style.background]="spotlight ? 'transparent' : 'rgba(0,0,0,0.72)'"
     (click)="skip()">
</div>

<!-- Spotlight cutout: box-shadow provides the surrounding dim mask -->
<div *ngIf="spotlight"
     class="fixed z-[10000] rounded-lg pointer-events-none"
     style="box-shadow: 0 0 0 9999px rgba(0,0,0,0.72); transition: top 0.25s ease, left 0.25s ease, width 0.25s ease, height 0.25s ease;"
     [style.top.px]="spotlight.top"
     [style.left.px]="spotlight.left"
     [style.width.px]="spotlight.width"
     [style.height.px]="spotlight.height">
</div>

<!-- Tooltip card (steps with a spotlight) -->
<div *ngIf="spotlight"
     class="fixed z-[10001] rounded-xl p-5 border border-surface-200 dark:border-surface-700"
     style="background: var(--p-content-background); box-shadow: 0 8px 32px rgba(0,0,0,0.35);"
     [ngStyle]="tooltipStyle">
  <div class="flex justify-between items-center mb-2">
    <span class="text-xs text-muted-color">{{ currentIndex + 1 }} of {{ steps.length }}</span>
    <button class="text-xs text-muted-color bg-transparent border-0 cursor-pointer p-0 hover:underline"
            (click)="skip()">Skip tour</button>
  </div>
  <h3 class="text-base font-semibold m-0 mb-2">{{ currentStep.title }}</h3>
  <p class="text-sm text-muted-color m-0 mb-4 leading-relaxed">{{ currentStep.description }}</p>
  <div class="flex gap-2 justify-end">
    <p-button label="Prev" icon="pi pi-arrow-left" severity="secondary" size="small"
              [disabled]="currentIndex === 0" (onClick)="prev()" />
    <p-button *ngIf="currentIndex < steps.length - 1"
              label="Next" icon="pi pi-arrow-right" iconPos="right" size="small"
              (onClick)="next()" />
    <p-button *ngIf="currentIndex === steps.length - 1"
              label="Finish" icon="pi pi-check" size="small" severity="success"
              (onClick)="finish()" />
  </div>
</div>

<!-- Welcome card (first step, no spotlight) -->
<div *ngIf="!spotlight"
     class="fixed z-[10001] rounded-2xl p-8 border border-surface-200 dark:border-surface-700"
     style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: min(480px, 90vw); background: var(--p-content-background); box-shadow: 0 8px 48px rgba(0,0,0,0.45);">
  <div class="flex items-center gap-3 mb-4">
    <span class="flex items-center justify-center w-10 h-10 rounded-full bg-primary-100 dark:bg-primary-900">
      <i class="pi pi-box text-primary-600 dark:text-primary-400 text-lg"></i>
    </span>
    <h2 class="text-xl font-semibold m-0">{{ currentStep.title }}</h2>
  </div>
  <p class="text-sm text-muted-color m-0 mb-6 leading-relaxed">{{ currentStep.description }}</p>
  <div class="flex items-center justify-between">
    <span class="text-xs text-muted-color">{{ steps.length - 1 }} sections to explore</span>
    <div class="flex gap-2">
      <p-button label="Skip Tour" severity="secondary" size="small" [text]="true" (onClick)="skip()" />
      <p-button label="Let's Go" icon="pi pi-arrow-right" iconPos="right" (onClick)="next()" />
    </div>
  </div>
</div>
