<div class="w-full flex flex-col content-background rounded-lg">
  <p-toast key="projectPermissions" position="bottom-right"></p-toast>
  <p-confirmDialog></p-confirmDialog>

  <p-table
    [value]="assignedUsers"
    [loading]="isLoading"
    [paginator]="true"
    [rows]="10"
    class="rounded-lg overflow-hidden"
  >
    <ng-template #caption>
      <div class="flex flex-col md:flex-row md:items-center justify-between gap-2">
        <div class="flex items-center gap-3">
          <span class="font-semibold text-xl">Project Permissions</span>
        </div>
        <div class="flex items-center gap-2">
          <span class="text-sm text-muted-color"
            >Manage roles for users assigned to this project.</span
          >
          <p-button
            label="Add User"
            icon="pi pi-plus"
            size="small"
            (onClick)="openAddDialog()"
          ></p-button>
        </div>
      </div>
    </ng-template>
    <ng-template pTemplate="header">
      <tr>
        <th>User</th>
        <th>Email</th>
        <th>Role</th>
        <th class="w-56">Actions</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row>
      <tr>
        <td class="font-medium">{{ row.name }}</td>
        <td>{{ row.email || '-' }}</td>
        <td>
          <p-select
            [options]="roleOptions"
            [(ngModel)]="draftRoleByUserId[row.userId]"
            optionLabel="label"
            optionValue="value"
            appendTo="body"
            class="w-full"
          ></p-select>
        </td>
        <td>
          <div class="flex gap-2">
            <p-button
              label="Save"
              icon="pi pi-check"
              size="small"
              [loading]="isSaving"
              (onClick)="saveUserRole(row)"
            ></p-button>
            <p-button
              label="Remove"
              icon="pi pi-trash"
              severity="danger"
              [outlined]="true"
              size="small"
              (onClick)="confirmRemoveUserRole(row)"
            ></p-button>
          </div>
        </td>
      </tr>
    </ng-template>

    <ng-template pTemplate="emptymessage">
      <tr>
        <td colspan="4" class="text-center text-sm text-muted-color p-4">
          No users have project access yet.
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog
    [(visible)]="isAddDialogVisible"
    [modal]="true"
    [dismissableMask]="true"
    [draggable]="false"
    [resizable]="false"
    [style]="{ width: 'min(680px, 96vw)' }"
    header="Add User To Project"
    (onHide)="closeAddDialog()"
  >
    <div class="flex flex-col gap-4">
      <p-autoComplete
        [(ngModel)]="selectedUserOption"
        [suggestions]="filteredUserOptions"
        (completeMethod)="filterAvailableUsers($event)"
        optionLabel="label"
        [dropdown]="true"
        [forceSelection]="true"
        appendTo="body"
        placeholder="Search and select user"
        class="w-full"
      ></p-autoComplete>

      <p-select
        [options]="roleOptions"
        [(ngModel)]="selectedRole"
        optionLabel="label"
        optionValue="value"
        appendTo="body"
        placeholder="Select role"
        class="w-full"
      ></p-select>

      <div class="flex justify-end gap-2">
        <p-button
          label="Cancel"
          severity="secondary"
          [outlined]="true"
          (onClick)="closeAddDialog()"
        ></p-button>
        <p-button
          label="Add"
          icon="pi pi-plus"
          [loading]="isSaving"
          (onClick)="addUserRole()"
        ></p-button>
      </div>
    </div>
  </p-dialog>
</div>
