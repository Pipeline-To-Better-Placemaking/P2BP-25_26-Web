<div class="min-h-screen w-full flex items-center justify-center surface-ground p-4">
  <p-card class="w-full max-w-md content-background">
    <ng-template pTemplate="title">
      <div class="text-center">
        <div class="text-xl font-semibold">Forgot Password</div>
        <div class="text-sm text-surface-500">Request a reset link by email</div>
      </div>
    </ng-template>

    <ng-template pTemplate="content">
      <form class="flex flex-col gap-4" (ngSubmit)="submit()">
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium" for="forgot-email">Email</label>
          <input
            id="forgot-email"
            pInputText
            type="email"
            autocomplete="email"
            [(ngModel)]="email"
            name="email"
            class="w-full"
          />
        </div>

        <p-button
          type="submit"
          label="Send Reset Link"
          [loading]="submitting"
          [disabled]="submitting"
          styleClass="w-full"
        />

        <p-message *ngIf="successMessage" severity="success" [text]="successMessage"></p-message>
        <p-message *ngIf="errorMessage" severity="error" [text]="errorMessage"></p-message>

        <div class="text-center text-sm">
          <a routerLink="/login" class="underline">Back to sign in</a>
        </div>
      </form>
    </ng-template>
  </p-card>
</div>
