<div class="min-h-screen flex bg-surface-50 text-color">
  <!-- Sidebar -->
  <aside class="w-72 flex flex-col px-5 py-6 gap-6 border-r border-surface-200 bg-surface-0">
    <div class="flex items-center gap-3">
      <div class="h-9 w-9 rounded-xl flex items-center justify-center text-xl font-bold bg-primary text-primary-contrast">
        BP
      </div>
      <div class="flex flex-col leading-tight">
        <span class="text-sm font-semibold tracking-wide">
          Better Placemaking
        </span>
        <span class="text-xs text-muted-color">
          Admin Console
        </span>
      </div>
    </div>

    <nav class="flex flex-col gap-2 mt-2">
      <p-button
        label="Dashboard"
        icon="pi pi-home"
        severity="primary"
        styleClass="w-full justify-start text-sm font-medium">
      </p-button>

      <p-button
        label="Projects"
        icon="pi pi-folder"
        [text]="true"
        severity="secondary"
        styleClass="w-full justify-start text-sm font-medium">
      </p-button>

      <p-button
        label="Insights"
        icon="pi pi-chart-line"
        [text]="true"
        severity="secondary"
        styleClass="w-full justify-start text-sm font-medium">
      </p-button>

      <p-button
        label="Settings"
        icon="pi pi-cog"
        [text]="true"
        severity="secondary"
        styleClass="w-full justify-start text-sm font-medium">
      </p-button>
    </nav>

    <div class="mt-auto flex flex-col gap-3 pt-4 border-t border-surface-200">
      <p-button
        label="Toggle Dark Mode"
        icon="pi pi-moon"
        [text]="true"
        severity="secondary"
        styleClass="w-full justify-start text-xs"
        (onClick)="toggleDarkMode()">
      </p-button>

      <p-button
        label="Help Center"
        icon="pi pi-question-circle"
        [text]="true"
        severity="secondary"
        styleClass="w-full justify-start text-xs">
      </p-button>

      <p-button
        label="Logout"
        icon="pi pi-sign-out"
        [text]="true"
        severity="danger"
        styleClass="w-full justify-start text-xs">
      </p-button>
    </div>
  </aside>

  <main class="flex-1 flex flex-col bg-surface-50">
    <section class="flex-1 p-8 overflow-auto">
      <div class="max-w-6xl mx-auto rounded-3xl p-6 border border-surface-200 bg-surface-0">
        <router-outlet></router-outlet>
      </div>
    </section>
  </main>
</div>
