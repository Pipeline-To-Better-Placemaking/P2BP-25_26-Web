<div class="point-cloud-viewer">

  <!-- Controls Panel -->
  <p-card>
    <ng-template #header>
      <div class="flex items-center gap-2 px-4 pt-4">
        <i class="pi pi-box text-xl"></i>
        <span class="text-lg font-semibold">3D Point Cloud Viewer</span>
      </div>
    </ng-template>

    <div class="controls-row">

      <!-- Quality Preset -->
      <div class="control-item">
        <label class="control-label">Quality:</label>
        <select
          [(ngModel)]="qualityPreset"
          (ngModelChange)="onQualityChange()"
          class="p-inputtext p-component control-select">
          <option *ngFor="let opt of qualityOptions" [value]="opt.value">{{ opt.label }}</option>
        </select>
      </div>

      <!-- Upload File -->
      <div class="control-item">
        <label class="control-label">Upload File:</label>
        <div class="control-inline">
          <input
            #fileInput
            type="file"
            accept=".obj,.xyz,.ply,.pts,.txt"
            (change)="onFileSelected($event)"
            class="file-input-hidden">
          <p-button
            [label]="selectedFile ? selectedFile.name : 'Choose File...'"
            icon="pi pi-file"
            styleClass="p-button-sm p-button-outlined"
            (onClick)="fileInput.click()">
          </p-button>
          <p-button
            label="Upload"
            icon="pi pi-upload"
            [disabled]="!selectedFile || isLoading"
            styleClass="p-button-sm"
            (onClick)="uploadFile()">
          </p-button>
        </div>
        <div *ngIf="uploadProgress > 0" class="progress-bar">
          <div class="progress-fill" [style.width.%]="uploadProgress"></div>
        </div>
      </div>

      <!-- Export -->
      <div class="control-item">
        <label class="control-label">Export:</label>
        <div class="control-inline">
          <select
            [(ngModel)]="selectedExport"
            class="p-inputtext p-component control-select">
            <option [ngValue]="undefined" disabled>Select format...</option>
            <option *ngFor="let opt of exportOptions" [ngValue]="opt">{{ opt.label }}</option>
          </select>
          <p-button
            label="Download"
            icon="pi pi-download"
            [disabled]="!selectedExport || lidar3D.length === 0"
            styleClass="p-button-sm p-button-outlined"
            (onClick)="exportPointCloud()">
          </p-button>
        </div>
      </div>

      <!-- Actions -->
      <div class="control-item actions-group">
        <p-button
          label="Refresh"
          icon="pi pi-refresh"
          styleClass="p-button-sm p-button-secondary"
          [disabled]="isLoading"
          (onClick)="refreshPointCloud()">
        </p-button>
        <p-button
          label="Clear"
          icon="pi pi-trash"
          styleClass="p-button-sm p-button-danger p-button-outlined"
          [disabled]="lidar3D.length === 0"
          (onClick)="clearPointCloud()">
        </p-button>
      </div>
    </div>

    <!-- Status message -->
    <div *ngIf="statusMessage" class="mt-3">
      <p-message
        [text]="statusMessage"
        [severity]="statusSeverity">
      </p-message>
    </div>

    <!-- Info bar -->
    <div class="info-bar mt-3">
      <span class="info-chip">
        <i class="pi pi-chart-bar"></i>
        {{ currentFps }} FPS
      </span>
      <span class="info-chip">
        <i class="pi pi-database"></i>
        {{ lidar3D.length.toLocaleString() }} points
      </span>
    </div>
  </p-card>

  <!-- 3D Canvas -->
  <div class="canvas-wrapper">
    <canvas #rendererCanvas></canvas>
    <div *ngIf="isLoading" class="loading-overlay">
      <i class="pi pi-spin pi-spinner" style="font-size: 2rem;"></i>
      <span>Loading...</span>
    </div>
  </div>

</div>
